<div class="govuk-checkboxes__item govuk-checkboxes--small moj-multi-select__checkbox body-checkbox {{ extraClasses }}">
  <input
    type="checkbox"
    class="govuk-checkboxes__input"
    [id]="inputId"
    [checked]="isChecked"
    [attr.aria-label]="rowAriaLabel"
    (change)="toggleRowSelection($event)"
  />
  <label class="govuk-label govuk-checkboxes__label" [for]="inputId">
    <span class="govuk-visually-hidden">{{ rowAriaLabel }}</span>
  </label>
</div>
